<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="조조님이 만져주셔">
  <meta name="mobile-web-app-capable" content="yes">
  <title>삼국지 : 조조님이 만져주셔</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/ui/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="splashing">
  <main id="app" class="app">
    <section class="stage" id="stage" data-screen="main">
      <section id="studioSplash" class="studio-splash" aria-label="Studio Ground">
        <img src="assets/ui/studio_ground_splash_9x16.png" alt="Studio Ground">
      </section>
      <img id="sceneImage" class="scene-image" alt="">
      <div id="shade" class="shade"></div>
      <div id="spriteLayer" class="sprite-layer" aria-hidden="true"></div>

      <div id="titleOverlay" class="title-overlay hidden" aria-hidden="true">
        <img id="titleLogo" class="title-logo" src="assets/ui/title_logo_clean.png" alt="삼국지 : 조조님이 만져주셔">
      </div>

      <section id="mainMenu" class="main-menu" aria-label="메인 화면">
        <div class="main-menu-inner">
          <img class="main-menu-logo" src="assets/ui/title_logo_clean.png" alt="삼국지 : 조조님이 만져주셔">
          <div class="main-menu-buttons">
            <button id="newGameBtn" type="button">새로 시작</button>
            <button id="continueBtn" type="button">이어하기</button>
            <button id="cgRecallBtn" type="button">CG 회상</button>
            <button id="optionsBtn" type="button">옵션</button>
          </div>
          <p id="mainMenuNotice" class="main-menu-notice" aria-live="polite"></p>
        </div>
      </section>

      <section id="mainSubPanel" class="main-sub-panel hidden" aria-label="메인 메뉴 패널">
        <div class="main-sub-card">
          <div class="drawer-head">
            <strong id="mainSubTitle">메뉴</strong>
            <button id="mainSubCloseBtn" class="icon-btn" type="button">닫기</button>
          </div>
          <div id="mainSubBody" class="drawer-body"></div>
        </div>
      </section>

      <header class="top-ui">
        <button id="menuBtn" class="icon-btn main-return-btn" type="button">메인메뉴</button>
        <div class="chapter-pill">
          <span id="chapterLabel">1화</span>
          <strong id="titleLabel">프롤로그</strong>
        </div>
      </header>

      <section id="choicePanel" class="choice-panel hidden" aria-label="선택지"></section>

      <section class="dialogue-box" id="dialogueBox">
        <div class="speaker-row">
          <strong id="speakerName" class="speaker-name">시스템</strong>
          <span id="progressText" class="progress-text">0 / 0</span>
        </div>
        <p id="mainText" class="main-text"></p>
        <div class="hint-row">
          <span id="typeLabel">ADV</span>
          <span id="touchHint">TOUCH</span>
        </div>
      </section>

      <aside id="drawer" class="drawer hidden" aria-label="게임 메뉴">
        <div class="drawer-card">
          <div class="drawer-head">
            <strong>게임 메뉴</strong>
            <button id="closeDrawerBtn" class="icon-btn" type="button">닫기</button>
          </div>
          <div class="menu-grid">
            <button id="saveBtn" type="button">저장</button>
            <button id="loadBtn" type="button">불러오기</button>
            <button id="autoBtn" type="button">자동</button>
            <button id="skipBtn" type="button">스킵</button>
            <button id="logBtn" type="button">로그</button>
            <button id="restartBtn" type="button">처음부터</button>
          </div>
          <div id="drawerBody" class="drawer-body"></div>
        </div>
      </aside>

      <aside id="mainReturnConfirm" class="confirm-modal hidden" aria-label="메인메뉴 이동 확인">
        <div class="confirm-card">
          <strong>메인메뉴로 돌아갈까요?</strong>
          <p>저장되지 않은 진행은 사라집니다. 정말 메인메뉴로 돌아가겠습니까?</p>
          <div class="confirm-actions">
            <button id="confirmMainReturnBtn" type="button">확인</button>
            <button id="cancelMainReturnBtn" type="button">취소</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="data/chapter_01.js"></script>
  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
